# general settings
name: 'UNetSupervised' #this name will appear as subfolder in the path
save_path: './model_weights/'

base_network:
  type: UNet
  params:
    in_nc: 1
    out_nc: 1
    residual: True
    n_feature: 48

    
scale: 1
gpus: [0] #index of the gpus to use, e.g. [0,1,3]
manual_seed: 42

# dataset and data loader settings
dataset:
    path_sino: '/data-pool/data_no_backup/ga63cun/PE/fanbeam_sinograms/'
    alpha: 100000
    sigma_G: 0.0005
    n_slices: 1
    return_clean_proj: True
dataset_train:
    df_path: './train.csv'
dataset_val:
    df_path: './val.csv'
    skip: 20
dataset_test:
    df_path: './test.csv'
    
# data loader
train_loader:
    shuffle: True
    num_workers: 12
    batch_size: 16
val_loader:
    shuffle: False
    num_workers: 12
    batch_size: 16
test_loader:
    shuffle: False
    num_workers: 12
    batch_size: 1
#parameters for the lightning module
lightning_params:
    lr: 0.0005
    gamma: 0.5
    loss_type: 'mse'

trainer_params:
  accumulate_grad_batches: 1
  limit_train_batches: 100
  precision: "bf16-mixed"

optimizer_algo: 'Adam'
optimizer_params:
  weight_decay: 0

scheduler_algo: 'ReduceLROnPlateau'
scheduler_params: 
    factor: 0.5
    patience: 5

earlyStopping: True
earlyStopping_params:
    monitor: 'val_loss'
    patience: 15
    mode: 'min'
